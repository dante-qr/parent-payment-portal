version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "VENDIS_API_URL=$VENDIS_API_URL" >> .env
        - echo "VENDIS_API_KEY=$VENDIS_API_KEY" >> .env
        - echo "VENDIS_USER_TOKEN=$VENDIS_USER_TOKEN" >> .env

        - echo "NODE_ENV=$NODE_ENV" >> .env

        - curl -fsSL https://bun.sh/install | bash
        - export BUN_INSTALL="$HOME/.bun"
        - export PATH="$BUN_INSTALL/bin:$PATH"
        - bun install
    build:
      commands:
        - export BUN_INSTALL="$HOME/.bun"
        - export PATH="$BUN_INSTALL/bin:$PATH"
        - bun run build
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - ~/.bun/**/*
