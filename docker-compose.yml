name: parent-payment-portal

services:
  postgres:
    image: postgres:18-alpine
    container_name: parent-payment-portal-postgres
    environment:
      POSTGRES_DB: parent-payment-portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '15432:5432'
    volumes:
      - parent-payment-portal_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  parent-payment-portal_postgres_data:
